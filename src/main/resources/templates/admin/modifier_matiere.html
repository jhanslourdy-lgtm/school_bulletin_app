<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifier Matière | Édition Premium</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.5);
            --secondary: #ec4899;
            --accent: #8b5cf6;
            --warning: #f59e0b;
            --dark: #0f172a;
            --darker: #020617;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--darker);
            color: white;
            min-height: 100vh;
        }

        /* Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .bg-grid {
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: 
                linear-gradient(rgba(99, 102, 241, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99, 102, 241, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 15s infinite ease-in-out;
        }

        .orb-1 { width: 500px; height: 500px; background: var(--warning); top: -200px; right: -200px; }
        .orb-2 { width: 400px; height: 400px; background: var(--primary); bottom: -100px; left: -100px; animation-delay: -5s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -30px) scale(1.1); }
        }

        /* Navbar */
        .navbar-premium {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 15px 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar-brand-premium {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, white, var(--warning));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-back {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: rgba(255, 255, 255, 0.8);
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 500;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-back:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--warning);
            color: white;
            transform: translateX(-3px);
        }

        /* Main Content */
        .main-content {
            position: relative;
            z-index: 10;
            padding: 40px 0;
        }

        /* Form Container */
        .edit-container {
            max-width: 600px;
            margin: 0 auto;
        }

        .edit-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.6s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .edit-header {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.2), rgba(99, 102, 241, 0.1));
            padding: 40px;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }

        .edit-icon {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, var(--warning), var(--primary));
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 2.5rem;
            box-shadow: 0 15px 40px rgba(245, 158, 11, 0.3);
            animation: rotate 10s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .edit-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .edit-subtitle {
            color: rgba(255, 255, 255, 0.6);
        }

        .edit-body {
            padding: 40px;
        }

        /* Current Info */
        .current-info {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .current-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .current-details h5 {
            margin: 0;
            font-weight: 600;
        }

        .current-details p {
            margin: 0;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
        }

        /* Form */
        .form-premium .form-label {
            color: rgba(255, 255, 255, 0.8);
            font-weight: 500;
            margin-bottom: 12px;
            font-size: 0.95rem;
        }

        .form-premium .form-control, .form-premium .form-select {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--border);
            border-radius: 14px;
            padding: 16px 20px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-premium .form-control:focus, .form-premium .form-select:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--warning);
            box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.1);
            color: white;
        }

        .form-premium .form-control::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .form-premium .form-select option {
            background: var(--dark);
            color: white;
        }

        .input-group-premium {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 1.2rem;
        }

        .form-premium .form-control.with-icon {
            padding-left: 55px;
        }

        /* Buttons */
        .btn-group-premium {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .btn-premium {
            flex: 1;
            padding: 16px 30px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
            border: none;
        }

        .btn-save {
            background: linear-gradient(135deg, var(--warning), #d97706);
            color: white;
            position: relative;
            overflow: hidden;
        }

        .btn-save::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .btn-save:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(245, 158, 11, 0.4);
        }

        .btn-save:hover::before {
            left: 100%;
        }

        .btn-cancel {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--border);
            color: rgba(255, 255, 255, 0.8);
        }

        .btn-cancel:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            color: white;
        }

        /* Alert */
        .alert-premium {
            border-radius: 16px;
            padding: 20px 25px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid;
        }

        .alert-danger-premium {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.3);
            color: #fca5a5;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .edit-body {
                padding: 25px;
            }
            
            .btn-group-premium {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <!-- Background -->
    <div class="bg-animation">
        <div class="bg-grid"></div>
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <!-- Navbar -->
    <nav class="navbar navbar-premium">
        <div class="container">
            <a class="navbar-brand navbar-brand-premium" href="#">
                <i class="bi bi-pencil-square me-2"></i>
                Modification
            </a>
            <a th:href="@{/admin/matieres}" class="btn-back">
                <i class="bi bi-arrow-left"></i>
                Retour aux matières
            </a>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="main-content">
        <div class="container">
            <div class="edit-container">
                <!-- Alert -->
                <div th:if="${error}" class="alert-premium alert-danger-premium">
                    <i class="bi bi-exclamation-triangle-fill fs-4"></i>
                    <span th:text="${error}"></span>
                </div>

                <div class="edit-card">
                    <div class="edit-header">
                        <div class="edit-icon">
                            <i class="bi bi-pencil"></i>
                        </div>
                        <h2 class="edit-title">Modifier la Matière</h2>
                        <p class="edit-subtitle">Mettez à jour les informations</p>
                    </div>
                    
                    <div class="edit-body">
                        <!-- Current Info -->
                        <div class="current-info">
                            <div class="current-icon">
                                <i class="bi bi-book"></i>
                            </div>
                            <div class="current-details">
                                <h5 th:text="${matiere.nom}">Nom actuel</h5>
                                <p>ID: <span th:text="${matiere.id}">0</span> • Coefficient actuel: <span th:text="${matiere.coefficient}">1</span></p>
                            </div>
                        </div>

                        <!-- Form -->
                        <form th:action="@{/admin/matieres/modifier/{id}(id=${matiere.id})}" method="post" class="form-premium">
                            <div class="mb-4">
                                <label class="form-label">Nom de la matière</label>
                                <div class="input-group-premium">
                                    <i class="bi bi-book input-icon"></i>
                                    <input type="text" 
                                           name="nom" 
                                           class="form-control with-icon" 
                                           th:value="${matiere.nom}" 
                                           required>
                                </div>
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label">Coefficient</label>
                                <div class="input-group-premium">
                                    <i class="bi bi-star input-icon"></i>
                                    <input type="number" 
                                           name="coefficient" 
                                           class="form-control with-icon" 
                                           th:value="${matiere.coefficient}" 
                                           min="1" 
                                           max="10" 
                                           required>
                                </div>
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label">Professeur assigné</label>
                                <select name="professeurId" class="form-select">
                                    <option value="">Non assigné</option>
                                    <option th:each="p : ${professeurs}" 
                                            th:value="${p.id}" 
                                            th:text="${p.nom}"
                                            th:selected="${matiere.professeur != null and matiere.professeur.id == p.id}">
                                    </option>
                                </select>
                            </div>
                            
                            <div class="btn-group-premium">
                                <a th:href="@{/admin/matieres}" class="btn-premium btn-cancel">
                                    <i class="bi bi-x-lg"></i>
                                    Annuler
                                </a>
                                <button type="submit" class="btn-premium btn-save">
                                    <i class="bi bi-check-lg"></i>
                                    Enregistrer
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
