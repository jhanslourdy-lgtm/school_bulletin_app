<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | Espace Académique</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.5);
            --secondary: #ec4899;
            --accent: #8b5cf6;
            --dark: #0f172a;
            --darker: #020617;
            --light: #f8fafc;
            --success: #10b981;
            --error: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            background: var(--darker);
            overflow: hidden;
            position: relative;
        }

        /* Animated Gradient Background */
        .gradient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #312e81, #1e1b4b, #0f172a);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            z-index: 0;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Floating Orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.6;
            animation: float 20s infinite ease-in-out;
            z-index: 1;
        }

        .orb-1 {
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            top: -200px;
            right: -100px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, #ec4899, #8b5cf6);
            bottom: -150px;
            left: -100px;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, #06b6d4, #6366f1);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -10s;
        }

        @keyframes float {
            0%, 100% { 
                transform: translate(0, 0) scale(1) rotate(0deg); 
            }
            25% { 
                transform: translate(50px, -50px) scale(1.1) rotate(5deg); 
            }
            50% { 
                transform: translate(-30px, 30px) scale(0.9) rotate(-5deg); 
            }
            75% { 
                transform: translate(-50px, -30px) scale(1.05) rotate(3deg); 
            }
        }

        /* Particle Network */
        #particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        /* Main Container */
        .main-container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* 3D Card Container */
        .card-3d-wrapper {
            perspective: 1000px;
            width: 100%;
            max-width: 480px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.5),
                0 0 0 1px rgba(255, 255, 255, 0.05),
                inset 0 0 80px rgba(255, 255, 255, 0.02);
            overflow: hidden;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            animation: cardEntry 1s ease-out;
        }

        @keyframes cardEntry {
            from {
                opacity: 0;
                transform: translateY(60px) rotateX(15deg);
            }
            to {
                opacity: 1;
                transform: translateY(0) rotateX(0);
            }
        }

        /* Card Shine Effect */
        .card-shine {
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.1),
                transparent
            );
            transition: left 0.5s;
            pointer-events: none;
        }

        .login-card:hover .card-shine {
            left: 100%;
        }

        /* Header Section */
        .card-header-custom {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(139, 92, 246, 0.1));
            padding: 50px 40px;
            text-align: center;
            position: relative;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Animated Logo */
        .logo-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin: 0 auto 25px;
        }

        .logo-ring {
            position: absolute;
            border-radius: 50%;
            border: 2px solid transparent;
            animation: rotate 10s linear infinite;
        }

        .logo-ring-1 {
            width: 100%;
            height: 100%;
            border-top-color: var(--primary);
            border-right-color: var(--secondary);
            animation-duration: 8s;
        }

        .logo-ring-2 {
            width: 80%;
            height: 80%;
            top: 10%;
            left: 10%;
            border-bottom-color: var(--accent);
            border-left-color: var(--primary);
            animation-duration: 12s;
            animation-direction: reverse;
        }

        .logo-ring-3 {
            width: 60%;
            height: 60%;
            top: 20%;
            left: 20%;
            border-top-color: var(--secondary);
            border-bottom-color: var(--accent);
            animation-duration: 6s;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .logo-center {
            position: absolute;
            width: 50%;
            height: 50%;
            top: 25%;
            left: 25%;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 
                0 0 40px var(--primary-glow),
                inset 0 0 20px rgba(255, 255, 255, 0.2);
            animation: pulse-glow 2s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% { 
                box-shadow: 0 0 40px var(--primary-glow), inset 0 0 20px rgba(255, 255, 255, 0.2);
                transform: scale(1);
            }
            50% { 
                box-shadow: 0 0 60px var(--primary-glow), inset 0 0 30px rgba(255, 255, 255, 0.3);
                transform: scale(1.05);
            }
        }

        .logo-center i {
            font-size: 2.5rem;
            color: white;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }

        .header-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.2rem;
            font-weight: 700;
            color: white;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(99, 102, 241, 0.3);
            letter-spacing: -0.5px;
        }

        .header-subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 1rem;
            font-weight: 400;
        }

        /* Form Section */
        .card-body-custom {
            padding: 40px;
        }

        /* Input Groups */
        .input-group-custom {
            position: relative;
            margin-bottom: 25px;
        }

        .input-field {
            width: 100%;
            padding: 18px 20px 18px 55px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            color: white;
            font-size: 1rem;
            font-family: 'Outfit', sans-serif;
            transition: all 0.3s ease;
            outline: none;
        }

        .input-field::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .input-field:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary);
            box-shadow: 
                0 0 0 4px rgba(99, 102, 241, 0.1),
                0 0 20px rgba(99, 102, 241, 0.2);
        }

        .input-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 1.3rem;
            transition: all 0.3s ease;
        }

        .input-field:focus ~ .input-icon {
            color: var(--primary);
            transform: translateY(-50%) scale(1.1);
        }

        .input-label {
            position: absolute;
            left: 55px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 1rem;
            pointer-events: none;
            transition: all 0.3s ease;
            background: transparent;
            padding: 0 5px;
        }

        .input-field:focus ~ .input-label,
        .input-field:not(:placeholder-shown) ~ .input-label {
            top: 0;
            left: 20px;
            transform: translateY(-50%) scale(0.85);
            color: var(--primary);
            background: var(--darker);
            font-weight: 500;
        }

        /* Password Toggle */
        .password-toggle {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s ease;
            padding: 5px;
        }

        .password-toggle:hover {
            color: var(--primary);
            transform: translateY(-50%) scale(1.1);
        }

        /* Error Message */
        .error-message {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.1), rgba(239, 68, 68, 0.05));
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #fca5a5;
            font-size: 0.95rem;
            animation: shake 0.5s ease-in-out, glow-red 2s ease-in-out infinite;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }

        @keyframes glow-red {
            0%, 100% { box-shadow: 0 0 5px rgba(239, 68, 68, 0.3); }
            50% { box-shadow: 0 0 20px rgba(239, 68, 68, 0.5); }
        }

        .error-icon {
            font-size: 1.3rem;
            color: var(--error);
        }

        /* Submit Button */
        .btn-submit {
            width: 100%;
            padding: 18px 30px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 
                0 10px 30px -10px var(--primary-glow),
                0 0 0 1px rgba(255, 255, 255, 0.1) inset;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-submit::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.6s ease;
        }

        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 
                0 20px 40px -10px var(--primary-glow),
                0 0 0 1px rgba(255, 255, 255, 0.2) inset;
        }

        .btn-submit:hover::before {
            left: 100%;
        }

        .btn-submit:active {
            transform: translateY(-1px);
        }

        .btn-submit.loading {
            pointer-events: none;
        }

        .btn-submit.loading .btn-text {
            opacity: 0;
        }

        .btn-submit.loading::after {
            content: '';
            position: absolute;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Footer Links */
        .card-footer-custom {
            padding: 0 40px 40px;
            text-align: center;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 25px;
        }

        .footer-link {
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            position: relative;
        }

        .footer-link::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            transition: width 0.3s ease;
        }

        .footer-link:hover {
            color: white;
        }

        .footer-link:hover::after {
            width: 100%;
        }

        /* Security Badge */
        .security-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.85rem;
        }

        .security-badge i {
            color: var(--success);
        }

        /* Floating Particles */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            opacity: 0.3;
            animation: particle-float 15s infinite;
        }

        @keyframes particle-float {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.3;
            }
            90% {
                opacity: 0.3;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* Responsive */
        @media (max-width: 576px) {
            .card-header-custom {
                padding: 40px 30px;
            }

            .header-title {
                font-size: 1.8rem;
            }

            .card-body-custom {
                padding: 30px;
            }

            .logo-container {
                width: 100px;
                height: 100px;
            }

            .footer-links {
                flex-direction: column;
                gap: 15px;
            }
        }

        /* Success State Animation */
        .success-checkmark {
            display: none;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--success), #059669);
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            animation: scale-in 0.5s ease;
        }

        .success-checkmark.show {
            display: flex;
        }

        @keyframes scale-in {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .success-checkmark i {
            font-size: 2.5rem;
            color: white;
        }
    </style>
</head>
<body>
    <!-- Animated Background -->
    <div class="gradient-bg"></div>
    
    <!-- Floating Orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    
    <!-- Floating Particles -->
    <div id="particles"></div>

    <!-- Main Container -->
    <div class="main-container">
        <div class="card-3d-wrapper" id="cardWrapper">
            <div class="login-card" id="loginCard">
                <div class="card-shine"></div>
                
                <!-- Success State (hidden by default) -->
                <div class="success-checkmark" id="successState">
                    <i class="bi bi-check-lg"></i>
                </div>

                <!-- Header -->
                <div class="card-header-custom" id="cardHeader">
                    <div class="logo-container">
                        <div class="logo-ring logo-ring-1"></div>
                        <div class="logo-ring logo-ring-2"></div>
                        <div class="logo-ring logo-ring-3"></div>
                        <div class="logo-center">
                            <i class="bi bi-mortarboard-fill"></i>
                        </div>
                    </div>
                    <h1 class="header-title">Espace Académique</h1>
                    <p class="header-subtitle">Connectez-vous à votre univers</p>
                </div>

                <!-- Body -->
                <div class="card-body-custom" id="cardBody">
                    <!-- Error Message -->
                    <div th:if="${error}" class="error-message" role="alert">
                        <i class="bi bi-exclamation-triangle-fill error-icon"></i>
                        <span th:text="${error}"></span>
                    </div>

                    <!-- Login Form -->
                    <form th:action="@{/login}" method="post" id="loginForm">
                        <!-- Email -->
                        <div class="input-group-custom">
                            <input type="email" 
                                   name="username" 
                                   class="input-field" 
                                   id="emailInput"
                                   placeholder=" " 
                                   required 
                                   autocomplete="email">
                            <i class="bi bi-envelope-fill input-icon"></i>
                            <label class="input-label">Adresse email</label>
                        </div>

                        <!-- Password -->
                        <div class="input-group-custom">
                            <input type="password" 
                                   name="password" 
                                   class="input-field" 
                                   id="passwordInput"
                                   placeholder=" " 
                                   required
                                   autocomplete="current-password">
                            <i class="bi bi-lock-fill input-icon"></i>
                            <label class="input-label">Mot de passe</label>
                            <button type="button" class="password-toggle" onclick="togglePassword()">
                                <i class="bi bi-eye" id="toggleIcon"></i>
                            </button>
                        </div>

                        <!-- Submit -->
                        <button type="submit" class="btn-submit" id="submitBtn">
                            <i class="bi bi-box-arrow-in-right"></i>
                            <span class="btn-text">Se connecter</span>
                        </button>
                    </form>
                </div>

                <!-- Footer -->
                <div class="card-footer-custom" id="cardFooter">
                    <div class="footer-links">
                        <a href="#" class="footer-link" onclick="showHelp(event)">
                            <i class="bi bi-question-circle"></i>
                            Aide
                        </a>
                        <a href="#" class="footer-link" onclick="showContact(event)">
                            <i class="bi bi-headset"></i>
                            Support
                        </a>
                    </div>
                    
                    <div class="security-badge">
                        <i class="bi bi-shield-check"></i>
                        <span>Connexion sécurisée SSL</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Create floating particles
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (15 + Math.random() * 10) + 's';
                container.appendChild(particle);
            }
        }
        createParticles();

        // 3D Tilt Effect
        const card = document.getElementById('loginCard');
        const wrapper = document.getElementById('cardWrapper');

        wrapper.addEventListener('mousemove', (e) => {
            const rect = wrapper.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            
            const rotateX = (y - centerY) / 20;
            const rotateY = (centerX - x) / 20;
            
            card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
        });

        wrapper.addEventListener('mouseleave', () => {
            card.style.transform = 'rotateX(0) rotateY(0)';
        });

        // Password visibility toggle
        function togglePassword() {
            const input = document.getElementById('passwordInput');
            const icon = document.getElementById('toggleIcon');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('bi-eye');
                icon.classList.add('bi-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('bi-eye-slash');
                icon.classList.add('bi-eye');
            }
        }

        // Form submission with loading state
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            const btn = document.getElementById('submitBtn');
            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('passwordInput').value;
            
            if (!email || !password) {
                e.preventDefault();
                return;
            }
            
            btn.classList.add('loading');
        });

        // Help popup
        function showHelp(e) {
            e.preventDefault();
            alert('🔐 Aide Connexion\n\n1. Vérifiez votre adresse email\n2. Le mot de passe est sensible à la casse\n3. Contactez l\'administrateur si vous êtes bloqué');
        }

        // Contact popup
        function showContact(e) {
            e.preventDefault();
            alert('📞 Support Technique\n\nEmail: support@academie.fr\nTél: +33 1 23 45 67 89\n\nDisponible 24/7');
        }

        // Auto-focus email
        window.addEventListener('load', () => {
            document.getElementById('emailInput').focus();
        });

        // Parallax effect for orbs on mouse move
        document.addEventListener('mousemove', (e) => {
            const orbs = document.querySelectorAll('.orb');
            const x = (e.clientX / window.innerWidth - 0.5) * 2;
            const y = (e.clientY / window.innerHeight - 0.5) * 2;
            
            orbs.forEach((orb, index) => {
                const speed = (index + 1) * 30;
                orb.style.transform = `translate(${x * speed}px, ${y * speed}px)`;
            });
        });

        // Input focus effects
        const inputs = document.querySelectorAll('.input-field');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                card.style.boxShadow = `
                    0 25px 50px -12px rgba(0, 0, 0, 0.5),
                    0 0 0 1px rgba(99, 102, 241, 0.3),
                    0 0 60px rgba(99, 102, 241, 0.2),
                    inset 0 0 80px rgba(255, 255, 255, 0.02)
                `;
            });
            
            input.addEventListener('blur', () => {
                card.style.boxShadow = `
                    0 25px 50px -12px rgba(0, 0, 0, 0.5),
                    0 0 0 1px rgba(255, 255, 255, 0.05),
                    inset 0 0 80px rgba(255, 255, 255, 0.02)
                `;
            });
        });
    </script>
</body>
</html>
